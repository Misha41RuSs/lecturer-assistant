  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" />
  
  <!-- Book/Lecture symbol -->
  <rect x="140" y="180" width="232" height="160" rx="8" fill="white" opacity="0.9"/>
  
  <!-- Pages -->
  <rect x="150" y="190" width="212" height="140" rx="4" fill="#f8f9fa"/>
  
  <!-- Text lines -->
  <rect x="170" y="210" width="172" height="8" rx="2" fill="#667eea"/>
  <rect x="170" y="230" width="140" height="8" rx="2" fill="#764ba2"/>
  <rect x="170" y="250" width="156" height="8" rx="2" fill="#667eea"/>
  <rect x="170" y="270" width="120" height="8" rx="2" fill="#764ba2"/>
  <rect x="170" y="290" width="164" height="8" rx="2" fill="#667eea"/>
  <rect x="170" y="310" width="132" height="8" rx="2" fill="#764ba2"/>
  
  <!-- Play button for presentation -->
  <circle cx="320" cy="220" r="20" fill="#4CAF50"/>
  <polygon points="310,210 310,230 330,220" fill="white"/>
  
  <!-- Graduation cap -->
  <path d="M 256 140 L 180 180 L 256 220 L 332 180 Z" fill="#FF6B6B" opacity="0.8"/>
