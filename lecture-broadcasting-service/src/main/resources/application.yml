server:
  port: 8082

spring:
  application:
    name: lecture-broadcasting-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/broadcasting_db}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:change_me}
    username: ${TELEGRAM_BOT_USERNAME:change_me_bot}

content-service:
  url: ${CONTENT_SERVICE_URL:http://localhost:8081}

analytics-service:
  url: ${ANALYTICS_SERVICE_URL:http://localhost:8084}

logging:
  level:
    org.telegram: DEBUG